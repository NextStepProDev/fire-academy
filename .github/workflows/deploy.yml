name: Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: Image tag to deploy (e.g. main, sha-abc1234, 0.1.0)
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="main"
          fi
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Encode docker-compose.prod.yml
        id: compose
        run: echo "content=$(base64 -w 0 fire-academy-hub/docker-compose.prod.yml)" >> $GITHUB_OUTPUT

      - name: Encode nginx.conf
        id: nginx
        run: echo "content=$(base64 -w 0 fire-academy-frontend/nginx.conf)" >> $GITHUB_OUTPUT

      - name: Deploy to production VM
        uses: appleboy/ssh-action@v1
        env:
          COMPOSE_B64: ${{ steps.compose.outputs.content }}
          NGINX_B64: ${{ steps.nginx.outputs.content }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: COMPOSE_B64,NGINX_B64
          script: |
            echo "$COMPOSE_B64" | base64 -d > ${{ secrets.DEPLOY_PATH }}/docker-compose.prod.yml
            echo "$NGINX_B64" | base64 -d > ${{ secrets.DEPLOY_PATH }}/nginx.conf
            cd ${{ secrets.DEPLOY_PATH }}
            export VERSION=${{ steps.version.outputs.version }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            # nginx.conf is bind-mounted from the host, so up -d alone won't reload
            # it when the image tag is unchanged. Validate and hot-reload explicitly.
            docker compose -f docker-compose.prod.yml exec -T frontend nginx -t
            docker compose -f docker-compose.prod.yml exec -T frontend nginx -s reload

      - name: Verify deployment health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "Waiting for backend to become healthy..."
            for i in $(seq 1 16); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' fa-backend-prod 2>/dev/null || echo "missing")
              echo "Attempt $i/16: backend health = $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "Deployment verified successfully."
                exit 0
              fi
              sleep 15
            done
            echo "ERROR: Backend did not become healthy within 4 minutes."
            docker logs --tail 80 fa-backend-prod
            exit 1

      - name: Smoke test public endpoints
        run: |
          BASE="https://fireworkout.pl"
          # Read-only GETs the live frontend actually uses; covers nginx routing
          # + backend + DB. Public list endpoints require a ?category= param.
          PATHS=(
            "/"
            "/api/public/instructors?category=TRAINING"
            "/api/public/event-types?category=TRAINING"
            "/api/public/events?category=TRAINING"
          )
          FAILED=0
          for p in "${PATHS[@]}"; do
            CODE="000"
            for attempt in 1 2 3; do
              CODE=$(curl -sS -m 15 -o /dev/null -w "%{http_code}" "${BASE}${p}" || echo "000")
              [ "$CODE" = "200" ] && break
              echo "  ${p} -> HTTP ${CODE} (attempt ${attempt}/3), retrying in 5s..."
              sleep 5
            done
            if [ "$CODE" = "200" ]; then
              echo "OK   HTTP 200  ${p}"
            else
              echo "FAIL HTTP ${CODE}  ${p}"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "ERROR: one or more public endpoints did not return 200 — deploy is unhealthy."
            exit 1
          fi
          echo "Smoke test passed: all public endpoints return 200."
