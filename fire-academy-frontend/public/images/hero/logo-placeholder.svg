      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="flame-inner" x1="100" y1="200" x2="100" y2="40" gradientUnits="userSpaceOnUse">
