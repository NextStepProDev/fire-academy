# HTTP → HTTPS redirect (Cloudflare hits origin on 443; this is a safety net)
server {
    listen 80;
    server_name fireworkout.pl www.fireworkout.pl _;
    return 301 https://fireworkout.pl$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name fireworkout.pl www.fireworkout.pl _;

    # Cloudflare Origin Certificate (mounted from host)
    ssl_certificate /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:5m;
    ssl_session_timeout 1h;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 15m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain text/xml;
    gzip_min_length 256;

    # Static assets with long cache (Vite hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images, fonts, favicon — cache 30 days
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # www → non-www redirect
    if ($host = www.fireworkout.pl) {
        return 301 https://fireworkout.pl$request_uri;
    }

    # Uploaded files proxy — browser cache 7d, nginx buffers response
    location /api/files/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 4 32k;
    }

    # OG proxy for social media crawlers on detail pages
    location ~ ^/kadra/[0-9a-f-]+$ {
        if ($http_user_agent ~* "(facebookexternalhit|Facebot|WhatsApp|Twitterbot|LinkedInBot|Slackbot|TelegramBot|Discordbot|Googlebot|bingbot|Baiduspider|YandexBot)") {
            rewrite ^/(.*)$ /og/$1 break;
            proxy_pass http://backend:8081;
        }
        try_files $uri /index.html;
    }

    location ~ ^/(treningi|obozy|szkolenia)/(rodzaj|termin)/[0-9a-f-]+$ {
        if ($http_user_agent ~* "(facebookexternalhit|Facebot|WhatsApp|Twitterbot|LinkedInBot|Slackbot|TelegramBot|Discordbot|Googlebot|bingbot|Baiduspider|YandexBot)") {
            rewrite ^/(.*)$ /og/$1 break;
            proxy_pass http://backend:8081;
        }
        try_files $uri /index.html;
    }

    # OG endpoint proxy
    location /og/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 4 16k;
    }

    # OAuth2 proxy
    location /oauth2/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Login OAuth2 proxy
    location /login/oauth2/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Sitemap proxy
    location = /sitemap.xml {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # SPA fallback — cache index.html briefly to avoid re-fetches
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
