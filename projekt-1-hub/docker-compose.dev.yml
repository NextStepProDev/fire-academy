services:
  postgres:
    image: postgres:17-alpine
    container_name: p1-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-projekt1}
      POSTGRES_USER: ${POSTGRES_USER:-projekt1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-projekt1_dev}
    ports:
      - "5433:5432"
    volumes:
      - p1_postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-projekt1}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: p1-mailhog-dev
    ports:
      - "1026:1025"
      - "8026:8025"

volumes:
  p1_postgres_data_dev:
