spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: fire-academy
  config:
    import: optional:file:.env[.properties]
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:fireacademy}
    username: ${DB_USER:fireacademy}
    password: ${DB_PASSWORD:fireacademy_dev}
    hikari:
      # Each connection is a Postgres backend process sharing the same ~1 GB box; traffic is tiny.
      # Raise only when HikariCP metrics actually show pool saturation.
      maximum-pool-size: ${HIKARI_MAX_POOL:8}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      keepalive-time: 120000
      max-lifetime: 1200000
      connection-timeout: 10000
      validation-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        jdbc:
          time_zone: UTC
          batch_size: 25
        default_batch_fetch_size: 16
        order_inserts: true
        order_updates: true
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS:true}
app:
  version: '@version@'
  storage:
    root: ${STORAGE_ROOT:./uploads}
  admin:
    email: ${ADMIN_EMAIL:}
    # Konta techniczne/deweloperskie (CSV) — mają admina do testów, ale są ukryte na liście użytkowników w panelu.
    hidden-emails: ${ADMIN_HIDDEN_EMAILS:}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:noreply@fireworkout.pl}}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:*}
  base-url: ${APP_BASE_URL:http://localhost:8081}
  site-url: ${SITE_URL:http://localhost:5174}
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
    issuer: fireworkout.pl

server:
  port: 8081
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    # Wolny SMTP (~10 s) przekracza timeout docker healthchecka (5 s) → fałszywe "unhealthy" → zbędny restart.
    # Maile to nie liveness — wyłączamy ich sondowanie w /actuator/health.
    mail:
      enabled: false

logging:
  level:
    pl.fireacademy: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
