services:
  postgres:
    image: postgres:17-alpine
    container_name: fa-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fireacademy}
      POSTGRES_USER: ${POSTGRES_USER:-fireacademy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fireacademy_dev}
    ports:
      - "5433:5432"
    volumes:
      - fa_postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fireacademy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: fa-mailhog-dev
    ports:
      - "1026:1025"
      - "8026:8025"

volumes:
  fa_postgres_data_dev:
